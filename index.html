</header>

function colorFor(mr){ if(mr<1)return['#199e70','#0f6e56']; if(mr<3)return['#97c459','#3b6d11']; if(mr<8)return['#ef9f27','#854f0b']; return['#e24b4a','#a32d2d']; }
function band(mr){ if(mr<1)return'under'; if(mr<3)return'low'; if(mr<8)return'mid'; return'high'; }
function lbl(mr){ return mr<0?'미달':(Number.isInteger(mr)?mr:mr.toFixed(1)); }
function depTxt(d){ return d>=10000?(Math.floor(d/10000)+'억'+String(d%10000).replace(/^0+/,'')+'만'):d+'만'; }

// 신/구 데이터 포맷을 안전하게 변환하는 함수
function parseTy(t) {
  const isNew = t.length >= 8;
  return {
    tp: t[0],
    r1: t[1],
    r2: isNew ? t[2] : null,
    r3: isNew ? t[3] : null,
    u: isNew ? t[4] : t[2],
    st: isNew ? t[5] : t[3],
    dep: isNew ? t[6] : t[4],
    rent: isNew ? t[7] : t[5]
  };
}

// 경쟁률 텍스트 출력 포맷 함수
function formatR(r) {
  if (r === null || r === undefined || r === '-') return '<span style="color:#aaa;">-</span>';
  if (r < 0) return '<span style="color:#0f6e56;font-weight:600;">미달</span>';
  return (Number.isInteger(r) ? r : r.toFixed(1)) + ':1';
}

const map = L.map('map').setView([37.55, 126.99], 11);
var layers = {
  '기본지도': L.tileLayer('https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18,subdomains:'abc'}),
  '밝은지도': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19,subdomains:'abcd'}),
  '위성': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19})
};
layers['밝은지도'].addTo(map);
L.control.layers(layers).addTo(map);

let markers = [];
let currentTier = 1;
let currentFilter = 'all';

// 지도에 마커를 다시 그리는 핵심 함수
function renderMap() {
  // 기존 마커 모두 삭제
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  D.forEach(b => {
    let minRate = Infinity;
    let hasData = false;

    // 현재 선택된 순위(tier)에 맞게 단지별 최저 경쟁률 계산
    b.ty.forEach(tRaw => {
      const t = parseTy(tRaw);
      const r = currentTier === 1 ? t.r1 : (currentTier === 2 ? t.r2 : t.r3);
      if (r !== null && r !== undefined && r !== '-') {
        hasData = true;
        if (r >= 0 && r < minRate) minRate = r;
        if (r < 0 && minRate > 0) minRate = r; // 미달(-1)이 하나라도 있으면 최저경쟁률은 미달로 표시
      }
    });

    const mr = hasData ? (minRate === Infinity ? -1 : minRate) : null;
    if (mr === null) return; // 해당 순위 데이터가 아예 없으면 마커 생략

    const currentBand = band(mr);
    if (currentFilter !== 'all' && currentBand !== currentFilter) return;

    const [bg, bd] = colorFor(mr);
    const size = mr < 0 ? 26 : 22;
    const icon = L.divIcon({className:'', html:'<div class="mk" style="width:'+size+'px;height:'+size+'px;background:'+bg+';border:1.5px solid '+bd+';">'+lbl(mr)+'</div>', iconSize:[size,size], iconAnchor:[size/2,size/2]});
    const m = L.marker([b.la, b.ln], {icon});

    let rows = b.ty.map(tRaw => {
      const t = parseTy(tRaw);
      return '<tr><td style="font-weight:600;">'+t.tp+'</td><td style="color:#666;">'+t.st+'</td><td>'+t.u+'호</td><td>'+formatR(t.r1)+'</td><td>'+formatR(t.r2)+'</td><td>'+formatR(t.r3)+'</td><td style="color:#666;white-space:nowrap;">보 '+depTxt(t.dep)+' / 월 '+t.rent+'천</td></tr>';
    }).join('');
    
    const html = '<div style="min-width:330px;"><div class="pt">'+b.n+'</div><div class="pa">📍 '+b.ad+'</div>'
      +'<table class="pp"><tr class="hd"><td>형</td><td>구조</td><td>호수</td><td>1순위</td><td>2순위</td><td>3순위</td><td>보증금/임료</td></tr>'+rows+'</table></div>';
    
    m.bindPopup(html, {maxWidth: Math.min(380, window.innerWidth - 40)});
    m.addTo(map); 
    markers.push(m);
  });
}

// 최초 1회 실행
renderMap();

// 1,2,3순위 라디오 버튼 이벤트
document.querySelectorAll('input[name="tier"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    currentTier = parseInt(e.target.value);
    renderMap();
  });
});

// 상단 필터 버튼 이벤트
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.f;
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('off'));
    if (currentFilter !== 'all') {
      document.querySelectorAll('.fbtn').forEach(x => {
        if (x.dataset.f !== currentFilter) x.classList.add('off');
      });
    }
    renderMap();
  });
});
